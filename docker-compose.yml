services:
  postgres:
    image: postgres:15-alpine
    container_name: wow-postgres
    environment:
      POSTGRES_USER: wow
      POSTGRES_PASSWORD: wow123
      POSTGRES_DB: arena
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    container_name: wow-app
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: wow
      DB_PASSWORD: wow123
      DB_NAME: arena
    restart: unless-stopped

volumes:
  postgres_data:
